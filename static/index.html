<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Николаич | Натуральные продукты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .cart-badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #16a34a; border-radius: 10px; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans">

    <header class="bg-green-700 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black tracking-tighter italic flex items-center gap-2">
                <span class="text-4xl">🚜</span> НИКОЛАИЧ
            </h1>
            <div class="flex items-center gap-6">
                <button onclick="toggleSecret()" class="opacity-40 hover:opacity-100 transition-all text-xl" title="Секретный вход">🔒</button>
                <div class="relative cursor-pointer group" onclick="toggleCart()">
                    <span class="text-3xl group-hover:scale-110 block transition">🛒</span>
                    <div id="cart-count" class="cart-badge hidden animate__animated animate__bounceIn">0</div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-6xl">
        <div id="category-bar" class="flex gap-3 overflow-x-auto py-6 no-scrollbar">
            </div>

        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 hidden z-[60] backdrop-blur-sm p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl animate__animated animate__slideInUp">
            <div class="p-6 border-b flex justify-between items-center bg-stone-50">
                <h2 class="text-2xl font-bold">Ваш заказ</h2>
                <button onclick="toggleCart()" class="text-stone-400 hover:text-stone-900 text-3xl">&times;</button>
            </div>
            <div id="cart-items" class="p-6 max-h-96 overflow-y-auto space-y-4">
                </div>
            <div class="p-6 bg-stone-50 border-t">
                <div class="flex justify-between items-end mb-6">
                    <span class="text-stone-500 font-medium">Итого к оплате:</span>
                    <span id="cart-total" class="text-3xl font-black text-green-700">0 ₽</span>
                </div>
                <button onclick="showCheckout()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-green-200 transition-all active:scale-95">
                    Оформить доставку
                </button>
            </div>
        </div>
    </div>

    <div id="checkout-modal" class="fixed inset-0 bg-black/60 hidden z-[70] backdrop-blur-sm p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 animate__animated animate__zoomIn">
            <h2 class="text-2xl font-bold mb-6">Куда везти?</h2>
            <form id="order-form" class="space-y-4" onsubmit="submitOrder(event)">
                <input type="text" id="name" placeholder="Ваше имя" required class="w-full bg-stone-100 border-none rounded-xl p-4 focus:ring-2 focus:ring-green-500 transition">
                <input type="tel" id="phone" placeholder="Номер телефона" required class="w-full bg-stone-100 border-none rounded-xl p-4 focus:ring-2 focus:ring-green-500 transition">
                <input type="text" id="address" placeholder="Адрес доставки" required class="w-full bg-stone-100 border-none rounded-xl p-4 focus:ring-2 focus:ring-green-500 transition">
                <input type="text" id="vk" placeholder="Ссылка на ВК (для уведомлений)" class="w-full bg-stone-100 border-none rounded-xl p-4 focus:ring-2 focus:ring-green-500 transition">
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="hideCheckout()" class="flex-1 bg-stone-200 py-4 rounded-xl font-bold">Отмена</button>
                    <button type="submit" class="flex-2 bg-green-600 text-white py-4 px-8 rounded-xl font-bold">Подтвердить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allProducts = [], cart = [], categories = [];

        async function init() {
            const res = await fetch('/api/store-data');
            const data = await res.json();
            allProducts = data.products;
            categories = data.categories;
            renderCategories();
            renderProducts(allProducts);
        }

        function renderCategories() {
            const bar = document.getElementById('category-bar');
            let html = `<button onclick="filter(null)" class="px-6 py-2 bg-green-700 text-white rounded-full font-bold shadow-md">Все</button>`;
            categories.forEach(c => {
                html += `<button onclick="filter(${c.id})" class="px-6 py-2 bg-white text-stone-600 rounded-full font-bold shadow-sm hover:bg-stone-100 transition whitespace-nowrap">${c.name}</button>`;
            });
            bar.innerHTML = html;
        }

        function renderProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = items.map(p => `
                <div class="product-card bg-white rounded-3xl p-4 border border-stone-100 animate__animated animate__fadeIn">
                    <div class="relative overflow-hidden rounded-2xl mb-4 bg-stone-100">
                        <img src="${p.img || '/uploads/default.jpg'}" class="w-full h-40 object-cover">
                        ${p.is_secret ? '<span class="absolute top-2 left-2 bg-black text-white text-[10px] px-2 py-1 rounded-lg uppercase tracking-widest font-bold">Secret</span>' : ''}
                    </div>
                    <h3 class="font-bold text-stone-800 text-sm mb-1 h-10 overflow-hidden leading-tight">${p.name}</h3>
                    <div class="flex justify-between items-end">
                        <div class="flex flex-col">
                            <span class="text-green-600 font-black text-xl">${p.price} ₽</span>
                            <span class="text-[10px] text-stone-400 uppercase font-bold">${p.unit}</span>
                        </div>
                        <button onclick="addToCart(${p.id})" class="bg-stone-900 text-white p-3 rounded-2xl hover:bg-green-600 transition active:scale-90">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            const inCart = cart.find(x => x.id === id);
            if(inCart) inCart.quantity++;
            else cart.push({...p, quantity: 1});
            updateCartUI();
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-count');
            badge.innerText = cart.reduce((s, i) => s + i.quantity, 0);
            badge.classList.remove('hidden');
            
            let total = 0;
            document.getElementById('cart-items').innerHTML = cart.map(i => {
                total += i.price * i.quantity;
                return `
                    <div class="flex items-center gap-4 bg-stone-50 p-3 rounded-2xl">
                        <img src="${i.img}" class="w-16 h-16 object-cover rounded-xl">
                        <div class="flex-1">
                            <p class="font-bold text-sm">${i.name}</p>
                            <p class="text-green-600 font-bold">${i.price * i.quantity} ₽</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="changeQty(${i.id}, -1)" class="w-8 h-8 rounded-full bg-white shadow-sm font-bold">-</button>
                            <span class="font-bold">${i.quantity}</span>
                            <button onclick="changeQty(${i.id}, 1)" class="w-8 h-8 rounded-full bg-white shadow-sm font-bold">+</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = total + ' ₽';
        }

        function changeQty(id, delta) {
            const i = cart.find(x => x.id === id);
            i.quantity += delta;
            if(i.quantity <= 0) cart = cart.filter(x => x.id !== id);
            updateCartUI();
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }
        function showCheckout() { if(cart.length) document.getElementById('checkout-modal').classList.remove('hidden'); }
        function hideCheckout() { document.getElementById('checkout-modal').classList.add('hidden'); }

        async function toggleSecret() {
            const code = prompt("Введите код доступа:");
            if(!code) return;
            const res = await fetch('/api/secret-auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code})
            });
            const data = await res.json();
            if(data.success) {
                allProducts = [...allProducts, ...data.products];
                renderProducts(allProducts);
                alert("🤫 Секретный раздел активирован!");
            } else alert("❌ Неверный код");
        }

        async function submitOrder(e) {
            e.preventDefault();
            const orderData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                vk_link: document.getElementById('vk').value,
                total: parseInt(document.getElementById('cart-total').innerText),
                cart: cart
            };
            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(orderData)
            });
            if((await res.json()).success) {
                alert("✅ Заказ успешно отправлен!");
                cart = [];
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
