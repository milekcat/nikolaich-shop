<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка Николаича</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-slate-900 text-white flex flex-col">
        <div class="p-6 border-b border-slate-700">
            <h2 class="text-2xl font-black tracking-tight text-green-400">CRM Николаич</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchTab('orders')" id="tab-orders" class="w-full text-left px-4 py-3 rounded-lg bg-green-600 text-white font-bold transition">📦 Заказы</button>
            <button onclick="switchTab('products')" id="tab-products" class="w-full text-left px-4 py-3 rounded-lg hover:bg-slate-800 text-gray-300 font-bold transition">🍎 Каталог</button>
            <button onclick="switchTab('vk')" id="tab-vk" class="w-full text-left px-4 py-3 rounded-lg hover:bg-slate-800 text-blue-400 font-bold transition">💬 Рассылка ВК</button>
        </nav>
        <div class="p-4 border-t border-slate-700 text-xs text-slate-500 text-center">
            Система управления v2.0
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        
        <section id="sec-orders" class="block">
            <h1 class="text-3xl font-bold mb-6 flex justify-between items-end">
                Заказы <button onclick="loadData()" class="text-sm bg-gray-200 text-gray-700 px-3 py-1 rounded hover:bg-gray-300">Обновить</button>
            </h1>
            <div class="bg-white rounded-xl shadow-sm overflow-hidden border">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b text-gray-600 text-sm uppercase">
                        <tr>
                            <th class="p-4 font-semibold">№</th>
                            <th class="p-4 font-semibold">Клиент</th>
                            <th class="p-4 font-semibold">Состав</th>
                            <th class="p-4 font-semibold">Сумма</th>
                            <th class="p-4 font-semibold">Статус</th>
                            <th class="p-4 font-semibold">Действия</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody" class="divide-y text-sm">
                        <tr><td colspan="6" class="p-6 text-center text-gray-400">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section id="sec-products" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-bold">Каталог товаров</h1>
                <button onclick="document.getElementById('add-product-modal').classList.remove('hidden')" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold shadow hover:bg-green-700">+ Добавить товар</button>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4" id="products-grid-admin">
                </div>
        </section>

        <section id="sec-vk" class="hidden max-w-2xl">
            <h1 class="text-3xl font-bold mb-6 text-blue-600">Рассылка ВКонтакте</h1>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-blue-100">
                <p class="text-gray-600 mb-4">Это сообщение будет отправлено в личку всем клиентам, которые указали свой VK при оформлении заказа.</p>
                <textarea id="vk-msg" rows="5" placeholder="Напишите текст рассылки (например, об акции или новом секретном коде)..." class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 mb-4 resize-none"></textarea>
                <button onclick="sendVkBroadcast()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Отправить всем клиентам</button>
            </div>
        </section>

    </main>

    <div id="add-product-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl w-full max-w-md p-6">
            <h2 class="text-xl font-bold mb-4">Новый товар</h2>
            <form id="add-form" onsubmit="submitNewProduct(event)" class="space-y-3">
                <input type="text" id="p-name" required placeholder="Название" class="w-full border p-2 rounded">
                <div class="flex gap-2">
                    <input type="number" id="p-price" required placeholder="Цена" class="w-full border p-2 rounded">
                    <input type="text" id="p-unit" value="шт" placeholder="Ед.изм" class="w-24 border p-2 rounded">
                </div>
                <input type="text" id="p-img" placeholder="Ссылка на фото (URL)" class="w-full border p-2 rounded">
                <label class="flex items-center gap-2 cursor-pointer p-2 border rounded bg-gray-50">
                    <input type="checkbox" id="p-secret" class="w-5 h-5 text-green-600 rounded">
                    <span class="font-bold text-gray-700">Сделать секретным 🤫</span>
                </label>
                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="document.getElementById('add-product-modal').classList.add('hidden')" class="flex-1 bg-gray-200 py-2 rounded font-bold hover:bg-gray-300">Отмена</button>
                    <button type="submit" class="flex-1 bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Переключение вкладок
        function switchTab(tabId) {
            ['orders', 'products', 'vk'].forEach(t => {
                document.getElementById('sec-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).className = "w-full text-left px-4 py-3 rounded-lg hover:bg-slate-800 text-gray-300 font-bold transition";
            });
            document.getElementById('sec-' + tabId).classList.remove('hidden');
            
            const activeColor = tabId === 'vk' ? 'bg-blue-600' : 'bg-green-600';
            document.getElementById('tab-' + tabId).className = `w-full text-left px-4 py-3 rounded-lg ${activeColor} text-white font-bold transition`;
            
            if(tabId === 'orders' || tabId === 'products') loadData();
        }

        // Загрузка данных админки
        async function loadData() {
            try {
                const res = await fetch('/api/admin/data');
                const data = await res.json();
                renderOrders(data.orders);
                renderProductsAdmin(data.products);
            } catch(e) { console.error(e); }
        }

        // Отрисовка заказов
        function renderOrders(orders) {
            const tbody = document.getElementById('orders-tbody');
            if(orders.length === 0) return tbody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-gray-400">Заказов пока нет</td></tr>';
            
            tbody.innerHTML = orders.map(o => `
                <tr class="hover:bg-gray-50">
                    <td class="p-4 font-bold text-gray-700">#${o.id}</td>
                    <td class="p-4">
                        <div class="font-bold">${o.name}</div>
                        <div class="text-xs text-gray-500">${o.phone}</div>
                        ${o.vk_link ? `<a href="${o.vk_link}" target="_blank" class="text-xs text-blue-500 hover:underline">ВКонтакте</a>` : ''}
                        <div class="text-xs text-gray-400 mt-1">${o.address}</div>
                    </td>
                    <td class="p-4 text-xs">
                        <ul class="list-disc list-inside text-gray-600">
                            ${o.items.map(i => `<li>${i.product_name} (${i.quantity} ${i.unit})</li>`).join('')}
                        </ul>
                    </td>
                    <td class="p-4 font-black text-green-600 whitespace-nowrap">${o.total} ₽</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded-full text-xs font-bold ${getStatusColor(o.status)}">${o.status}</span>
                    </td>
                    <td class="p-4">
                        <select onchange="updateStatus(${o.id}, this.value)" class="border rounded p-1 text-xs bg-white outline-none">
                            <option value="" disabled selected>Изменить...</option>
                            <option value="Новый">Новый</option>
                            <option value="В работе">В работе</option>
                            <option value="Курьер в пути">Курьер в пути</option>
                            <option value="Доставлен">Доставлен</option>
                            <option value="Отменен">Отменен</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusColor(status) {
            if(status === 'Новый') return 'bg-yellow-100 text-yellow-700';
            if(status === 'В работе') return 'bg-blue-100 text-blue-700';
            if(status === 'Курьер в пути') return 'bg-purple-100 text-purple-700';
            if(status === 'Доставлен') return 'bg-green-100 text-green-700';
            if(status === 'Отменен') return 'bg-red-100 text-red-700';
            return 'bg-gray-100 text-gray-700';
        }

        // Обновление статуса заказа
        async function updateStatus(orderId, newStatus) {
            if(!newStatus) return;
            try {
                await fetch(`/api/admin/orders/${orderId}/status`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({status: newStatus})
                });
                loadData();
            } catch(e) { alert("Ошибка сохранения"); }
        }

        // Отрисовка товаров в админке
        function renderProductsAdmin(products) {
            const grid = document.getElementById('products-grid-admin');
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-3 rounded-lg border shadow-sm relative group">
                    <img src="${p.img || 'https://via.placeholder.com/150'}" class="w-full h-24 object-cover rounded mb-2">
                    <div class="text-xs font-bold truncate">${p.name}</div>
                    <div class="text-green-600 font-bold text-sm">${p.price} ₽</div>
                    ${p.is_secret ? '<div class="absolute top-2 left-2 text-xs bg-slate-900 text-white px-1 rounded">Секрет</div>' : ''}
                    <button onclick="deleteProduct(${p.id})" class="absolute top-2 right-2 bg-red-500 text-white w-6 h-6 rounded-full opacity-0 group-hover:opacity-100 transition shadow">&times;</button>
                </div>
            `).join('');
        }

        // Добавление товара
        async function submitNewProduct(e) {
            e.preventDefault();
            const payload = {
                category_id: 1, // Дефолт
                name: document.getElementById('p-name').value,
                description: '',
                price: parseFloat(document.getElementById('p-price').value),
                unit: document.getElementById('p-unit').value,
                img: document.getElementById('p-img').value,
                stock: 999,
                is_popular: 0, is_promo: 0,
                is_secret: document.getElementById('p-secret').checked ? 1 : 0
            };

            await fetch('/api/admin/products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            document.getElementById('add-form').reset();
            document.getElementById('add-product-modal').classList.add('hidden');
            loadData();
        }

        // Удаление товара
        async function deleteProduct(id) {
            if(!confirm("Точно удалить товар?")) return;
            await fetch(`/api/admin/products/${id}`, {method: 'DELETE'});
            loadData();
        }

        // Рассылка ВК
        async function sendVkBroadcast() {
            const text = document.getElementById('vk-msg').value;
            if(!text.trim()) return alert("Напишите текст сообщения!");
            if(!confirm("Отправить сообщение ВСЕМ клиентам с ВК?")) return;

            try {
                const res = await fetch('/api/admin/vk/broadcast', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: text})
                });
                const data = await res.json();
                if(data.success) {
                    alert(`✅ Отправлено ${data.count} клиентам!`);
                    document.getElementById('vk-msg').value = '';
                } else { alert("❌ Ошибка: " + data.error); }
            } catch(e) { alert("Ошибка сети"); }
        }

        loadData();
    </script>
</body>
</html>
