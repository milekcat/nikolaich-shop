<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Николаич | Управление магазином</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex h-screen text-gray-800 font-sans">
    
    <aside class="w-64 bg-gray-900 text-white flex flex-col">
        <div class="p-6 text-xl font-black italic">УПРАВЛЕНИЕ</div>
        <nav class="flex-1 space-y-1 mt-4">
            <button onclick="tab('orders')" class="w-full text-left p-4 hover:bg-gray-800 border-l-4 border-blue-500">📦 Заказы на доставку</button>
            <button onclick="tab('users')" class="w-full text-left p-4 hover:bg-gray-800 border-l-4 border-transparent">👥 Клиенты (VIP)</button>
            <button onclick="tab('ai')" class="w-full text-left p-4 hover:bg-gray-800 border-l-4 border-purple-500">🧠 AI Дизайн & Реклама</button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <section id="sec-orders">
            <h1 class="text-3xl font-black mb-8">Заказы на доставку</h1>
            <div id="orders-list" class="grid gap-6"></div>
        </section>

        <section id="sec-users" class="hidden">
            <h1 class="text-3xl font-black mb-8">База клиентов</h1>
            <div id="users-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-ai" class="hidden">
            <h1 class="text-3xl font-black mb-8 text-purple-900">Нейросетевое управление</h1>
            
            <div class="bg-white p-8 rounded-2xl shadow-sm mb-8 border border-purple-100">
                <h2 class="text-xl font-bold mb-4">🎨 Изменить дизайн сайта под праздник</h2>
                <p class="text-gray-500 text-sm mb-4">Напишите повод, и ИИ полностью перекрасит витрину магазина, поменяет кнопки и приветствие.</p>
                <div class="flex gap-4">
                    <input type="text" id="ai-event" class="flex-1 bg-gray-50 border p-4 rounded-xl" placeholder="Например: 8 Марта, Новый Год, Хэллоуин...">
                    <button onclick="changeTheme()" id="btn-theme" class="bg-purple-600 text-white px-8 rounded-xl font-bold hover:bg-purple-700">Применить дизайн</button>
                </div>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-sm border border-purple-100">
                <h2 class="text-xl font-bold mb-4">🖨 Генератор печатной рекламы (с QR-кодом)</h2>
                <div class="flex gap-4 mb-6">
                    <input type="text" id="ai-ad" class="flex-1 bg-gray-50 border p-4 rounded-xl" placeholder="О чем акция? (Скидка на шашлык в мае)">
                    <button onclick="genAd()" id="btn-ad" class="bg-blue-600 text-white px-8 rounded-xl font-bold hover:bg-blue-700">Создать макет</button>
                </div>
                
                <div id="ad-result" class="hidden bg-gray-50 p-6 rounded-xl border-2 border-dashed border-gray-300 text-center max-w-lg mx-auto">
                    <h3 id="ad-title" class="text-3xl font-black uppercase text-gray-900 mb-4"></h3>
                    <p id="ad-text" class="text-lg text-gray-600 italic mb-6"></p>
                    <img id="ad-qr" src="" class="mx-auto w-32 h-32 border p-2 bg-white rounded-lg">
                </div>
            </div>
        </section>
    </main>

    <script>
        function tab(t) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + t).classList.remove('hidden');
            if(t === 'orders') loadData();
        }

        async function loadData() {
            const r = await fetch('/api/admin/data'); const d = await r.json();
            
            // Рендер заказов
            document.getElementById('orders-list').innerHTML = d.orders.map(o => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-blue-500">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-xs font-bold">ЗАКАЗ #${o.id}</span>
                            <h3 class="text-xl font-black mt-2">${o.name} <span class="text-gray-400 font-normal text-sm">${o.phone}</span></h3>
                            <p class="text-gray-600 mt-1">📍 <b>Доставка:</b> ${o.address}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-black text-green-600">${o.total} ₽</span>
                        </div>
                    </div>
                    <div class="bg-gray-50 p-3 rounded-lg text-sm">
                        ${o.items.map(i => `<div>• ${i.product_name} — ${i.quantity} ${i.unit}</div>`).join('')}
                    </div>
                </div>`).join('');
                
            // Рендер юзеров
            document.getElementById('users-list').innerHTML = d.users.map(u => `<div class="bg-white p-4 rounded-xl border shadow-sm"><b>${u.name}</b><p class="text-sm text-gray-500">${u.phone}</p><p class="text-xs mt-2">VIP статус: ${u.is_approved ? '✅ Да' : '❌ Нет'}</p></div>`).join('');
        }

        async function changeTheme() {
            const event = document.getElementById('ai-event').value;
            const btn = document.getElementById('btn-theme'); btn.innerText = "Магия...";
            const r = await fetch('/api/ai/theme', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({event})});
            const d = await r.json();
            if(d.success) alert("Дизайн витрины успешно обновлен!"); else alert("Ошибка ИИ");
            btn.innerText = "Применить дизайн";
        }

        async function genAd() {
            const topic = document.getElementById('ai-ad').value;
            const btn = document.getElementById('btn-ad'); btn.innerText = "Генерирую...";
            const r = await fetch('/api/ai/generate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({topic})});
            const d = await r.json();
            document.getElementById('ad-title').innerText = d.title;
            document.getElementById('ad-text').innerText = d.text;
            document.getElementById('ad-qr').src = d.qr;
            document.getElementById('ad-result').classList.remove('hidden');
            btn.innerText = "Создать макет";
        }

        loadData();
    </script>
</body>
</html>
