<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Николаич | CRM 7.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f4f5f7; display: flex; height: 100vh; font-family: -apple-system, sans-serif; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #e5e5ea; padding: 25px; }
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .card-ui { background: #fff; border-radius: 20px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 24px; }
        .nav-link { color: #8e8e93; font-weight: 600; border-radius: 12px; margin-bottom: 5px; }
        .nav-link.active { background: #f2f2f7; color: #000; }
        .badge-status { font-size: 12px; padding: 6px 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="fw-bold text-success mb-4"><i class="bi bi-shop"></i> Николаич</h4>
    <nav class="nav flex-column gap-1">
        <a class="nav-link active" href="#" onclick="show('orders', this)"><i class="bi bi-cart me-2"></i> Заказы</a>
        <a class="nav-link" href="#" onclick="show('crm', this)"><i class="bi bi-people me-2"></i> Клиенты (18+)</a>
        <a class="nav-link" href="#" onclick="show('ai', this)"><i class="bi bi-magic me-2"></i> ИИ & Баннеры</a>
    </nav>
</div>

<div class="main-content">
    
    <div id="orders" class="tab">
        <h2 class="fw-bold mb-4">Управление заказами</h2>
        <div class="card-ui p-0 overflow-hidden">
            <table class="table table-hover m-0 align-middle">
                <thead class="table-light"><tr><th>ID</th><th>Клиент</th><th>Сумма (с доставкой)</th><th>Состав</th><th>Статус</th></tr></thead>
                <tbody id="ordersTable"></tbody>
            </table>
        </div>
    </div>

    <div id="crm" class="tab" style="display:none">
        <h2 class="fw-bold mb-4">База клиентов</h2>
        <div class="card-ui p-0 overflow-hidden">
            <table class="table table-hover m-0 align-middle">
                <thead class="table-light"><tr><th>Телефон</th><th>Бонусы</th><th>Статус 18+</th><th>Действия</th></tr></thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>
    </div>

    <div id="ai" class="tab" style="display:none">
        <h2 class="fw-bold mb-4">Нейро-сотрудники</h2>
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card-ui h-100">
                    <h5 class="fw-bold mb-3"><i class="bi bi-image text-primary"></i> ИИ-Дизайнер (Баннеры)</h5>
                    <input type="text" id="bannerTopic" class="form-control mb-3 bg-light border-0 p-3" placeholder="О чем акция? (Например: Скидка на мясо на выходных)">
                    <button class="btn btn-dark w-100 fw-bold py-2" onclick="genBanner(this)">Сгенерировать баннер</button>
                    
                    <div id="bannerPreview" class="mt-4" style="display:none">
                        <div class="p-3 rounded-4 mb-3" id="bCard" style="min-height:120px; color:#000;">
                            <h4 id="bTitle" class="fw-bold"></h4>
                            <p id="bSub" class="m-0 opacity-75"></p>
                        </div>
                        <img id="bImg" class="w-100 rounded-4 mb-3 shadow-sm">
                        <select id="bLink" class="form-select mb-3 bg-light border-0"><option value="1">Вести в категорию: Мясо</option><option value="2">Молоко</option><option value="4">18+ (Настойки)</option></select>
                        <button class="btn btn-success w-100 fw-bold py-2" onclick="publishBanner()">Опубликовать на главную</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card-ui h-100">
                    <h5 class="fw-bold mb-3"><i class="bi bi-briefcase text-warning"></i> Бизнес-консультанты</h5>
                    <select id="aiRole" class="form-select mb-3 bg-light border-0"><option value="marketer">Маркетолог (Тексты, акции)</option><option value="lawyer">Юрист (Законы, оферты)</option></select>
                    <textarea id="aiMsg" class="form-control mb-3 bg-light border-0 p-3" rows="4" placeholder="Задайте вопрос..."></textarea>
                    <button class="btn btn-outline-dark w-100 fw-bold py-2" onclick="askAgent(this)">Спросить</button>
                    <div id="aiReply" class="mt-3 p-3 bg-light rounded-4 small" style="display:none; white-space: pre-wrap;"></div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    // Навигация
    function show(id, btn) {
        document.querySelectorAll('.tab').forEach(t => t.style.display='none');
        document.getElementById(id).style.display='block';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'orders') loadOrders();
        if(id === 'crm') loadUsers();
    }

    // Загрузка заказов
    async function loadOrders() {
        const res = await fetch('/api/admin/orders'); const data = await res.json();
        document.getElementById('ordersTable').innerHTML = data.map(o => `
            <tr>
                <td class="fw-bold">#${o.id}</td>
                <td>${o.phone}</td>
                <td class="fw-bold text-success">${o.final_total} ₽</td>
                <td class="small text-muted" style="max-width:200px;">${o.items}</td>
                <td>
                    <select class="form-select form-select-sm border-0 bg-light fw-bold" onchange="updateOrderStatus(${o.id}, this.value)">
                        <option value="Новый" ${o.status=='Новый'?'selected':''}>Новый</option>
                        <option value="В сборке" ${o.status=='В сборке'?'selected':''}>В сборке</option>
                        <option value="В пути" ${o.status=='В пути'?'selected':''}>В пути</option>
                        <option value="Выполнен" ${o.status=='Выполнен'?'selected':''}>Выполнен</option>
                    </select>
                </td>
            </tr>
        `).join('');
    }

    async function updateOrderStatus(id, status) {
        await fetch('/api/admin/orders', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, status})});
    }

    // Загрузка клиентов (CRM и 18+)
    async function loadUsers() {
        const res = await fetch('/api/admin/users'); const data = await res.json();
        document.getElementById('usersTable').innerHTML = data.map(u => {
            let ageBadge = u.age_verified == 2 ? '<span class="badge bg-success">Одобрен</span>' : (u.age_verified == 1 ? '<span class="badge bg-warning text-dark">Ждет проверки</span>' : '<span class="badge bg-secondary">Нет</span>');
            let ageBtn = u.age_verified == 1 ? `<button class="btn btn-sm btn-success fw-bold me-2" onclick="userAction(${u.id}, 'approve_18')">Одобрить 18+</button>` : '';
            return `<tr>
                <td class="fw-bold">${u.phone}</td>
                <td class="fw-bold text-success">${u.bonuses} 💎</td>
                <td>${ageBadge}</td>
                <td>${ageBtn}<button class="btn btn-sm btn-outline-primary fw-bold" onclick="userAction(${u.id}, 'add_bonus', 500)">+500 Бонусов</button></td>
            </tr>`;
        }).join('');
    }

    async function userAction(id, action, amount=0) {
        await fetch('/api/admin/users', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, action, amount})});
        loadUsers();
    }

    // ИИ Генератор баннеров
    let currentBanner = null;
    async function genBanner(btn) {
        btn.innerText = 'Создаю шедевр...'; btn.disabled = true;
        const res = await fetch('/api/ai/gen_banner', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({topic: document.getElementById('bannerTopic').value})});
        currentBanner = await res.json();
        document.getElementById('bTitle').innerText = currentBanner.title;
        document.getElementById('bSub').innerText = currentBanner.subtitle;
        document.getElementById('bCard').style.background = currentBanner.bg_color;
        document.getElementById('bImg').src = currentBanner.img_url;
        document.getElementById('bannerPreview').style.display = 'block';
        btn.innerText = 'Сгенерировать баннер'; btn.disabled = false;
    }

    async function publishBanner() {
        const data = {...currentBanner, link_cat: document.getElementById('bLink').value};
        await fetch('/api/banners/publish', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
        alert('Успех! Баннер улетел на главную страницу.');
    }

    // ИИ Консультанты
    async function askAgent(btn) {
        btn.innerText = 'Думает...'; btn.disabled = true;
        const res = await fetch('/api/ai/agent', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({role: document.getElementById('aiRole').value, msg: document.getElementById('aiMsg').value})});
        const data = await res.json();
        document.getElementById('aiReply').innerText = data.reply;
        document.getElementById('aiReply').style.display = 'block';
        btn.innerText = 'Спросить'; btn.disabled = false;
    }

    // При загрузке страницы грузим заказы
    window.onload = loadOrders;
</script>
</body>
</html>
