<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>У Николаича - Фермерские продукты</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa; --wood: #3e2723; --green: #2e7d32; --light-green: #e8f5e9; --red: #e53935;
            --text: #212121; --gray: #757575; --card: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 120px; -webkit-tap-highlight-color: transparent;}
        
        /* Инфо панель */
        .info-bar { background: var(--wood); color: white; padding: 12px 20px; font-size: 13px; line-height: 1.4; }
        .info-bar strong { color: #ffeb3b; font-size: 14px;}
        
        /* Шапка */
        .top-bar { position: sticky; top: 0; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.03); padding-bottom: 10px;}
        .header { padding: 15px 20px 10px; font-size: 26px; font-weight: 900; color: var(--wood); display: flex; justify-content: space-between; align-items: center;}
        .delivery-badge { background: var(--light-green); color: var(--green); padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 800; }

        /* Акции (Слайдер) */
        .promo-slider { display: flex; overflow-x: auto; padding: 15px 20px; gap: 15px; scroll-snap-type: x mandatory;}
        .promo-slider::-webkit-scrollbar { display: none; }
        .promo-card { min-width: 280px; height: 140px; border-radius: 20px; background: linear-gradient(45deg, var(--green), #4caf50); color: white; padding: 20px; scroll-snap-align: start; position: relative; overflow: hidden; display: flex; align-items: center;}
        .promo-card img { position: absolute; right: 0; top: 0; height: 100%; opacity: 0.8; object-fit: cover;}
        .promo-card h3 { position: relative; z-index: 2; font-size: 18px; max-width: 60%; line-height: 1.3;}

        /* Категории */
        .categories { display: flex; overflow-x: auto; padding: 5px 20px; gap: 10px; }
        .categories::-webkit-scrollbar { display: none; }
        .chip { background: var(--bg); padding: 10px 18px; border-radius: 20px; font-size: 15px; font-weight: 800; white-space: nowrap; transition: 0.3s; color: var(--gray); border: 1px solid #eee; cursor:pointer;}
        .chip.active { background: var(--green); color: white; border-color: var(--green); }

        /* Сетка товаров */
        .container { padding: 10px 20px; }
        .cat-title { font-size: 22px; font-weight: 900; margin: 25px 0 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        
        .card { background: var(--card); border-radius: 24px; padding: 12px; display: flex; flex-direction: column; box-shadow: 0 6px 16px rgba(0,0,0,0.04); position: relative;}
        .discount-badge { position: absolute; top: 10px; left: 10px; background: var(--red); color: white; font-size: 12px; font-weight: 800; padding: 4px 8px; border-radius: 10px; z-index: 2;}
        .card-img { width: 100%; height: 130px; border-radius: 16px; object-fit: cover; background: #f0f0f0; margin-bottom: 12px; }
        .card-img-placeholder { width: 100%; height: 130px; border-radius: 16px; background: var(--light-green); display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 12px;}
        
        .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px;}
        .price { font-weight: 900; font-size: 20px; color: var(--text); }
        .old-price { font-size: 14px; color: var(--gray); text-decoration: line-through; font-weight: 600;}
        .title { font-size: 14px; font-weight: 700; margin-bottom: 4px; line-height: 1.2; }
        .desc { font-size: 12px; color: var(--gray); margin-bottom: 12px; flex-grow: 1; line-height: 1.3; }
        
        .btn-add { width: 100%; padding: 12px; border: none; background: #f0f4f8; font-weight: 800; font-size: 15px; border-radius: 16px; cursor: pointer; color: var(--green); transition: 0.2s;}
        .btn-add:active { transform: scale(0.95); }
        .qty-controls { display: none; width: 100%; justify-content: space-between; align-items: center; background: var(--green); color: white; border-radius: 16px; padding: 4px; }
        .qty-btn { background: none; border: none; font-size: 20px; font-weight: 800; color: white; width: 36px; height: 36px; cursor: pointer; }

        /* Корзина */
        .cart-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--green); color: white; padding: 18px 24px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 18px; box-shadow: 0 12px 30px rgba(46, 125, 50, 0.4); transform: translateY(150%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; z-index: 1000; }
        .cart-bar.visible { transform: translateY(0); }

        /* Модалка оформления */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; flex-direction: column; justify-content: flex-end; backdrop-filter: blur(4px);}
        .modal-content { background: white; border-radius: 30px 30px 0 0; padding: 30px 25px; animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1); max-height: 90vh; overflow-y: auto;}
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 15px;}
        .form-input { width: 100%; padding: 16px; border: 2px solid #eee; border-radius: 16px; font-size: 16px; font-family: inherit; font-weight: 600; transition: 0.3s; background: #fafafa;}
        .form-input:focus { border-color: var(--green); outline: none; background: white;}
        .btn-apply { padding: 0 20px; background: var(--wood); color: white; border: none; border-radius: 16px; font-weight: 800; cursor: pointer;}
        
        .receipt { background: var(--bg); padding: 15px; border-radius: 16px; margin-bottom: 20px;}
        .receipt-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; color: var(--gray);}
        .receipt-total { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 2px dashed #ddd; font-weight: 900; font-size: 22px; color: var(--text);}
        
        .btn-submit { width: 100%; padding: 18px; background: var(--green); color: white; border: none; border-radius: 20px; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);}
        .close-btn { position: absolute; right: 25px; top: 25px; background: #eee; border: none; width: 40px; height: 40px; border-radius: 20px; font-size: 20px; font-weight: bold; cursor: pointer;}
    </style>
</head>
<body>

    <div class="info-bar">
        📍 <b>г. Ярославль, пер. 1-й Голубятный, д. 12</b><br>
        📞 <a href="tel:+79201494959" style="color:white; text-decoration:none; font-weight:bold;">+7 (920) 149-49-59</a>
    </div>

    <div class="top-bar">
        <div class="header">
            У Николаича 🚜
            <div class="delivery-badge">От 10 мин</div>
        </div>
        <div class="categories" id="catContainer"></div>
    </div>

    <div class="promo-slider" id="promoContainer"></div>
    <div class="container" id="mainContainer"></div>

    <div class="cart-bar" id="floatingCart" onclick="openCheckout()">
        <span id="cartTotalText">Корзина 0 ₽</span>
        <span>Оформить ➔</span>
    </div>

    <div class="modal" id="checkoutModal">
        <div class="modal-content" style="position:relative;">
            <button class="close-btn" onclick="closeCheckout()">✕</button>
            <h2 style="margin-bottom: 20px; font-weight: 900;">Оформление</h2>
            
            <input type="text" id="cName" class="form-input" placeholder="Ваше имя" style="margin-bottom:10px;">
            <input type="tel" id="cPhone" class="form-input" placeholder="Телефон (+7...)" style="margin-bottom:10px;">
            <input type="text" id="cAddress" class="form-input" placeholder="Куда везем? (Улица, дом, кв)" style="margin-bottom:20px;">
            
            <div class="input-group">
                <input type="text" id="cPromo" class="form-input" placeholder="Промокод (если есть)" style="margin-bottom:0;">
                <button class="btn-apply" onclick="applyPromo()">OK</button>
            </div>

            <div class="receipt">
                <div class="receipt-row"><span>Товары:</span><span id="rSubtotal">0 ₽</span></div>
                <div class="receipt-row" style="color:var(--red)" id="rDiscountRow"><span>Скидка:</span><span id="rDiscount">0 ₽</span></div>
                <div class="receipt-row"><span>Доставка:</span><span style="color:var(--green)">Бесплатно</span></div>
                <div class="receipt-total"><span>Итого:</span><span id="rTotal">0 ₽</span></div>
            </div>
            
            <button class="btn-submit" onclick="submitOrder()">Заказать доставку</button>
        </div>
    </div>

    <script>
        let cart = {};
        let store = { categories: [], products: [], promotions: [] };
        let discountPercent = 0;

        async function loadData() {
            const res = await fetch('/api/store-data');
            store = await res.json();
            renderPromos();
            renderCategories();
            renderProducts();
        }

        function renderPromos() {
            if(store.promotions.length === 0) { document.getElementById('promoContainer').style.display = 'none'; return; }
            document.getElementById('promoContainer').innerHTML = store.promotions.map(p => `
                <div class="promo-card">
                    ${p.img ? `<img src="${p.img}">` : ''}
                    <h3>${p.title}</h3>
                </div>
            `).join('');
        }

        function renderCategories() {
            document.getElementById('catContainer').innerHTML = store.categories.map((c, i) => 
                `<div class="chip ${i===0?'active':''}" onclick="scrollToCat(${c.id}, this)">${c.name}</div>`
            ).join('');
        }

        function renderProducts() {
            let html = '';
            store.categories.forEach(cat => {
                const prods = store.products.filter(p => p.category_id === cat.id);
                if(prods.length > 0) {
                    html += `<div class="cat-title" id="cat-${cat.id}">${cat.name}</div><div class="grid">`;
                    prods.forEach(p => {
                        const qty = cart[p.id] ? cart[p.id].quantity : 0;
                        const hasDiscount = p.old_price > p.price;
                        
                        let imgHtml = p.img ? `<img src="${p.img}" class="card-img">` : `<div class="card-img-placeholder">🛒</div>`;
                        
                        html += `
                            <div class="card">
                                ${hasDiscount ? `<div class="discount-badge">Выгода</div>` : ''}
                                ${imgHtml}
                                <div class="price-row">
                                    <span class="price">${p.price} ₽</span>
                                    ${hasDiscount ? `<span class="old-price">${p.old_price} ₽</span>` : ''}
                                </div>
                                <div class="title">${p.name}</div>
                                <div class="desc">${p.description || ''}</div>
                                
                                <div style="margin-top:auto;">
                                    <button class="btn-add" id="add-${p.id}" style="display:${qty>0?'none':'block'}" onclick="updCart(${p.id}, 1)">В корзину</button>
                                    <div class="qty-controls" id="qty-${p.id}" style="display:${qty>0?'flex':'none'}">
                                        <button class="qty-btn" onclick="updCart(${p.id}, -1)">−</button>
                                        <span id="val-${p.id}" style="font-weight:900">${qty}</span>
                                        <button class="qty-btn" onclick="updCart(${p.id}, 1)">+</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
            });
            document.getElementById('mainContainer').innerHTML = html;
        }

        function updCart(id, change) {
            const p = store.products.find(x => x.id === id);
            if(!cart[id]) cart[id] = {...p, quantity: 0};
            cart[id].quantity += change;
            
            if(cart[id].quantity <= 0) {
                delete cart[id];
                document.getElementById(`add-${id}`).style.display = 'block';
                document.getElementById(`qty-${id}`).style.display = 'none';
            } else {
                document.getElementById(`add-${id}`).style.display = 'none';
                document.getElementById(`qty-${id}`).style.display = 'flex';
                document.getElementById(`val-${id}`).innerText = cart[id].quantity;
            }
            calcTotal();
        }

        function calcTotal() {
            let sum = 0;
            Object.values(cart).forEach(i => sum += i.price * i.quantity);
            const bar = document.getElementById('floatingCart');
            if(sum > 0) {
                document.getElementById('cartTotalText').innerText = `${sum} ₽`;
                bar.classList.add('visible');
            } else {
                bar.classList.remove('visible');
            }
            return sum;
        }

        function openCheckout() {
            updateReceipt();
            document.getElementById('checkoutModal').style.display = 'flex';
        }
        function closeCheckout() { document.getElementById('checkoutModal').style.display = 'none'; }

        async function applyPromo() {
            const code = document.getElementById('cPromo').value;
            if(!code) return;
            const res = await fetch('/api/check-promo', {
                method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({code})
            });
            const data = await res.json();
            if(data.success) {
                discountPercent = data.discount;
                alert(`Промокод применен! Скидка ${discountPercent}%`);
                updateReceipt();
            } else {
                alert('Неверный промокод');
                discountPercent = 0;
                updateReceipt();
            }
        }

        function updateReceipt() {
            const subtotal = calcTotal();
            const discount = Math.round(subtotal * (discountPercent / 100));
            const total = subtotal - discount;
            
            document.getElementById('rSubtotal').innerText = `${subtotal} ₽`;
            if(discount > 0) {
                document.getElementById('rDiscountRow').style.display = 'flex';
                document.getElementById('rDiscount').innerText = `-${discount} ₽`;
            } else {
                document.getElementById('rDiscountRow').style.display = 'none';
            }
            document.getElementById('rTotal').innerText = `${total} ₽`;
        }

        async function submitOrder() {
            const name = document.getElementById('cName').value;
            const phone = document.getElementById('cPhone').value;
            const address = document.getElementById('cAddress').value;
            if(!name || !phone || !address) return alert("Заполните все поля!");

            const subtotal = calcTotal();
            const total = subtotal - Math.round(subtotal * (discountPercent / 100));
            const promo_code = discountPercent > 0 ? document.getElementById('cPromo').value : '';

            const res = await fetch('/api/checkout', {
                method: 'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ name, phone, address, total, promo: promo_code, cart: Object.values(cart) })
            });
            const data = await res.json();
            if(data.success) {
                alert(`Успех! Ваш заказ №${data.order_id} передан на сборку.`);
                cart = {}; discountPercent = 0;
                closeCheckout(); renderProducts(); calcTotal();
            }
        }

        function scrollToCat(id, el) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const target = document.getElementById(`cat-${id}`);
            if(target) window.scrollTo({top: target.offsetTop - 140, behavior: 'smooth'});
        }

        loadData();
    </script>
</body>
</html>
