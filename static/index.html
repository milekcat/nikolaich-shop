<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Николаич.Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Динамический цвет из админки */
        :root { --main-color: {{ theme_color }}; }
        .bg-custom { background-color: var(--main-color) !important; color: white; }
        .btn-custom { background-color: var(--main-color); border: none; color: white; }
        .btn-custom:hover { opacity: 0.8; color: white; }
        .banner { padding: 40px 20px; border-radius: 15px; margin-bottom: 20px; color: white; text-align: center;}
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-custom shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-white" href="#">🍔 Николаич.Shop</a>
  </div>
</nav>

<div class="container mt-4">
    <div class="row mb-4">
        {% for banner in banners %}
        <div class="col-md-12">
            <div class="banner shadow-sm" style="background-color: {{ banner.bg_color }};">
                <h2 class="fw-bold">{{ banner.promo_text }}</h2>
                <button class="btn btn-light mt-2">Заказать по акции</button>
            </div>
        </div>
        {% endfor %}
    </div>

    <h3 class="mb-3">🔥 Популярное</h3>
    <div class="row">
        {% for product in products %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm h-100">
                <img src="{{ product.image_url }}" class="card-img-top" alt="...">
                <div class="card-body text-center">
                    <h5 class="card-title">{{ product.name }}</h5>
                    <p class="fs-4 fw-bold text-success">{{ product.price }} руб.</p>
                    <button class="btn btn-custom w-100">В корзину</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
