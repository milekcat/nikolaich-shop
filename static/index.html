<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Николаич.Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --main-color: {{ theme }}; }
        body { background-color: #f8f9fa; }
        .navbar { background-color: var(--main-color) !important; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-custom { background-color: var(--main-color); border: none; color: white; transition: 0.3s;}
        .btn-custom:hover { opacity: 0.8; color: white; transform: scale(1.05);}
        .banner-wrapper { position: relative; border-radius: 15px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);}
        .banner-wrapper img { width: 100%; height: 350px; object-fit: cover; opacity: 0.6; }
        .banner-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.8);}
    </style>
</head>
<body>

<nav class="navbar p-3"><div class="container"><h2 class="text-white m-0 fw-bold">🍔 Николаич.Shop</h2></div></nav>

<div class="container mt-5">
    {% for b in banners %}
    <div class="banner-wrapper" style="background-color: {{ b.bg_color }};">
        <img src="{{ b.image_url }}" alt="Баннер">
        <div class="banner-content p-4">
            <h1 class="display-3 fw-bold">{{ b.title }}</h1>
            <h3 class="text-warning mb-4">{{ b.text }}</h3>
            <span class="badge bg-danger fs-4 px-4 py-2 shadow">{{ b.rules }}</span>
        </div>
    </div>
    {% endfor %}

    <h2 class="mb-4 fw-bold mt-5">Меню</h2>
    <div class="row">
        {% for p in products %}
        <div class="col-md-3 mb-4">
            <div class="card h-100 border-0 shadow-sm text-center">
                <img src="{{ p.image_url }}" class="card-img-top" alt="Товар">
                <div class="card-body">
                    <h5 class="fw-bold">{{ p.name }}</h5>
                    <p class="fs-4 text-success fw-bold">{{ p.price }} ₽</p>
                    <p class="text-muted small">В наличии: {{ p.stock }} шт.</p>
                </div>
                <div class="card-footer bg-white border-0"><button class="btn btn-custom w-100 p-2 fs-5">В корзину</button></div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
