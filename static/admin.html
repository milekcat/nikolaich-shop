<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Николаич | Центр Управления</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex h-screen font-sans text-gray-900">
    <aside class="w-72 bg-green-950 text-white p-8 flex flex-col shadow-2xl z-10">
        <h2 class="text-3xl font-black italic border-b-2 border-green-800 pb-6 mb-6 text-amber-500">УПРАВЛЕНИЕ</h2>
        <nav class="space-y-3">
            <button onclick="tab('orders')" class="w-full text-left p-4 rounded-xl font-bold bg-green-800 hover:bg-green-700 transition">🚚 Логистика (Заказы)</button>
            <button onclick="tab('catalog')" class="w-full text-left p-4 rounded-xl font-bold hover:bg-green-800 transition">📦 Склад (Вкл/Выкл)</button>
            <button onclick="tab('users')" class="w-full text-left p-4 rounded-xl font-bold hover:bg-green-800 transition">👥 VIP Доступы</button>
            <button onclick="tab('ai')" class="w-full text-left p-4 rounded-xl font-bold hover:bg-green-800 transition mt-8 border-t border-green-800 pt-6 text-indigo-300">🧠 AI Маркетинг</button>
        </nav>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto bg-gray-50">
        
        <section id="sec-orders">
            <h1 class="text-4xl font-black mb-8 border-l-8 border-green-600 pl-4">Служба доставки</h1>
            <div id="orders-list" class="space-y-6"></div>
        </section>

        <section id="sec-catalog" class="hidden">
            <h1 class="text-4xl font-black mb-8 border-l-8 border-amber-500 pl-4">Наличие на складе</h1>
            <div class="bg-white rounded-2xl shadow-md border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 border-b-2 border-gray-200">
                        <tr><th class="p-5 font-bold uppercase text-sm">Товар</th><th class="p-5 font-bold uppercase text-sm">Цена</th><th class="p-5 font-bold uppercase text-sm">Статус на витрине</th></tr>
                    </thead>
                    <tbody id="catalog-list" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-users" class="hidden">
            <h1 class="text-4xl font-black mb-8 border-l-8 border-blue-500 pl-4">Управление VIP</h1>
            <div id="users-list" class="grid grid-cols-2 gap-6"></div>
        </section>

        <section id="sec-ai" class="hidden">
            <h1 class="text-4xl font-black mb-8 text-indigo-900 border-l-8 border-indigo-600 pl-4">AI Генератор рекламы</h1>
            <div class="bg-white p-10 rounded-3xl shadow-md border">
                <div class="flex gap-4 mb-8">
                    <input type="text" id="ai-topic" class="flex-1 bg-gray-50 border-2 border-gray-200 p-5 rounded-2xl text-lg outline-none focus:border-indigo-500" placeholder="О чем делаем акцию? (Например: Скидка на говядину в выходные)">
                    <button onclick="genBanner()" class="bg-indigo-600 text-white px-10 rounded-2xl font-black text-lg hover:bg-indigo-700">Создать</button>
                </div>
                <div id="ai-res" class="hidden bg-gray-50 p-12 rounded-3xl border-4 border-dashed border-gray-300 text-center">
                    <h3 id="ai-title" class="text-5xl font-black uppercase text-green-900 mb-6 leading-tight"></h3>
                    <p id="ai-text" class="text-2xl text-gray-700 italic mb-10"></p>
                    <img id="ai-qr" src="" class="mx-auto w-48 h-48 border-4 border-white shadow-lg rounded-xl">
                </div>
            </div>
        </section>
    </main>

    <script>
        function tab(t) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById('sec-'+t).classList.remove('hidden'); }
        
        async function load() {
            const r = await fetch('/api/admin/data'); const d = await r.json();
            
            // Заказы (Логистика)
            document.getElementById('orders-list').innerHTML = d.orders.map(o => `
                <div class="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm flex flex-col xl:flex-row gap-8 relative overflow-hidden">
                    <div class="w-full xl:w-1/3 border-r border-gray-100 pr-6">
                        <div class="inline-block bg-green-100 text-green-800 px-4 py-1 rounded-full text-xs font-black uppercase mb-4">Заказ #${o.id}</div>
                        <h3 class="font-black text-2xl mb-1">${o.name}</h3><p class="text-gray-500 font-bold mb-4">${o.phone}</p>
                        <div class="bg-gray-50 p-4 rounded-xl border mb-2"><p class="text-xs text-gray-400 uppercase font-bold mb-1">Адрес доставки</p><p class="font-medium">${o.address}</p></div>
                        <div class="bg-amber-50 p-4 rounded-xl border border-amber-100"><p class="text-xs text-amber-600 uppercase font-bold mb-1">Окно доставки</p><p class="font-black text-amber-900">${o.delivery_time || 'Не указано'}</p></div>
                    </div>
                    <div class="w-full xl:w-2/3 flex flex-col justify-between">
                        <div class="space-y-3 mb-6">
                            ${o.items.map(i => `<div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100"><span class="font-bold text-gray-700">${i.product_name}</span><span class="bg-white px-3 py-1 rounded-lg shadow-sm font-black border">${i.quantity} ${i.unit}</span></div>`).join('')}
                        </div>
                        <div class="text-right border-t pt-6"><span class="text-gray-400 font-bold uppercase mr-4">Итого к оплате</span><span class="text-4xl font-black text-green-700">${o.total} ₽</span></div>
                    </div>
                </div>`).join('');

            // Склад (Тумблеры)
            document.getElementById('catalog-list').innerHTML = d.products.map(p => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-5 font-black text-lg text-gray-800">${p.name} <span class="text-xs font-normal text-gray-400 ml-2">${p.category}</span> ${p.is_vip ? '<span class="bg-amber-100 text-amber-800 text-[10px] px-2 py-1 rounded uppercase ml-2">VIP</span>':''}</td>
                    <td class="p-5 font-bold text-green-700 text-lg">${p.price} ₽</td>
                    <td class="p-5">
                        <button onclick="toggleProd(${p.id})" class="px-6 py-2 rounded-xl font-black text-sm uppercase transition-all shadow-sm border ${p.is_available ? 'bg-green-500 text-white hover:bg-green-600 border-green-600' : 'bg-red-100 text-red-600 hover:bg-red-200 border-red-200'}">
                            ${p.is_available ? 'Доступен' : 'Скрыт'}
                        </button>
                    </td>
                </tr>`).join('');

            // Пользователи
            document.getElementById('users-list').innerHTML = d.users.map(u => `
                <div class="bg-white p-6 rounded-2xl border shadow-sm flex flex-col justify-between">
                    <div class="mb-6">
                        <b class="text-xl block mb-1">${u.name}</b><p class="text-gray-500 font-medium">${u.phone}</p><p class="text-sm mt-3 bg-gray-50 p-3 rounded-lg border">📍 ${u.address}</p>
                    </div>
                    ${u.is_approved ? `<div class="bg-green-100 text-green-800 text-center py-3 rounded-xl font-black uppercase">Одобрен (Код: ${u.vip_code})</div>` : `<button onclick="approve(${u.id})" class="bg-amber-500 text-white py-3 rounded-xl font-black uppercase hover:bg-amber-600 shadow-md">Одобрить заявку</button>`}
                </div>`).join('');
        }

        async function toggleProd(id) {
            await fetch('/api/admin/product/toggle', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})}); load();
        }

        async function approve(id) {
            const code = prompt("Назначьте секретный код для входа:"); if(!code) return;
            await fetch('/api/admin/approve', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, code})}); load();
        }

        async function genBanner() {
            const r = await fetch('/api/ai/banner', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({topic: document.getElementById('ai-topic').value})});
            const d = await r.json();
            document.getElementById('ai-title').innerText = d.title; document.getElementById('ai-text').innerText = d.text;
            document.getElementById('ai-qr').src = d.qr; document.getElementById('ai-res').classList.remove('hidden');
        }
        load();
    </script>
</body>
</html>
