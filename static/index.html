<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>У Николаича | Натуральные продукты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-stone-50 text-stone-900 font-sans">
    <header class="bg-green-900 text-white p-6 sticky top-0 z-50 shadow-2xl flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-4xl animate__animated animate__bounceIn">🚜</span>
            <h1 class="text-2xl font-black tracking-widest italic uppercase">У Николаича</h1>
        </div>
        <button class="bg-white/10 p-3 rounded-full hover:bg-white/20 transition">🛒</button>
    </header>

    <main class="container mx-auto p-4 max-w-6xl">
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 my-10">
            <div class="bg-gradient-to-br from-green-800 to-green-900 rounded-[3rem] p-10 text-white shadow-2xl overflow-hidden relative group">
                <div class="relative z-10">
                    <h2 class="text-4xl font-black mb-4">Домашнее Мясо</h2>
                    <p class="text-green-100 opacity-80">Только натуральный откорм без добавок.</p>
                </div>
                <div class="absolute -bottom-10 -right-10 text-9xl opacity-10 group-hover:rotate-12 transition">🥩</div>
            </div>
            <div class="bg-gradient-to-br from-amber-600 to-amber-700 rounded-[3rem] p-10 text-white shadow-2xl overflow-hidden relative group">
                <div class="relative z-10">
                    <h2 class="text-4xl font-black mb-4">Свежий Урожай</h2>
                    <p class="text-amber-50 opacity-80">Овощи прямо с грядки к вашему столу.</p>
                </div>
                <div class="absolute -bottom-10 -right-10 text-9xl opacity-10 group-hover:-rotate-12 transition">🥦</div>
            </div>
        </section>

        <h2 class="text-3xl font-black mb-8 border-l-8 border-green-800 pl-6">Наши товары</h2>
        <div id="catalog" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
    </main>

    <footer class="bg-stone-900 text-stone-500 py-20 text-center relative mt-20">
        <div class="container mx-auto">
            <p class="text-lg font-bold text-stone-300 mb-2">«У Николаича» — вкус настоящей жизни</p>
            <p class="text-sm opacity-50">Ярославская область, 2026</p>
        </div>
        <div onclick="document.getElementById('vip-modal').classList.remove('hidden')" class="absolute bottom-4 right-4 opacity-5 hover:opacity-100 cursor-pointer p-4 transition-all">🔒</div>
    </footer>

    <div id="vip-modal" class="fixed inset-0 bg-black/90 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-stone-800 border border-stone-700 rounded-3xl w-full max-w-md p-10 text-white animate__animated animate__zoomIn">
            <div id="auth-box">
                <h3 class="text-2xl font-black text-amber-500 mb-6 tracking-widest uppercase text-center">Закрытый Клуб</h3>
                <div class="space-y-4">
                    <input type="text" id="phone" placeholder="Телефон" class="w-full bg-stone-900 border-none rounded-xl p-4">
                    <input type="password" id="pass" placeholder="Пароль" class="w-full bg-stone-900 border-none rounded-xl p-4">
                    <input type="text" id="vcode" placeholder="Код доступа" class="w-full bg-stone-900 border-2 border-amber-500/30 rounded-xl p-4">
                    <button onclick="login()" class="w-full bg-amber-600 py-4 rounded-xl font-black hover:bg-amber-500 transition">ВОЙТИ</button>
                    <p class="text-center text-stone-500 text-sm mt-4 cursor-pointer" onclick="showReg()">Нет доступа? Зарегистрироваться</p>
                </div>
            </div>
            <div id="reg-box" class="hidden">
                <h3 class="text-2xl font-black text-green-500 mb-6 uppercase text-center">Заявка</h3>
                <div class="space-y-4">
                    <input type="text" id="r-name" placeholder="ФИО" class="w-full bg-stone-900 rounded-xl p-4">
                    <input type="text" id="r-phone" placeholder="Телефон" class="w-full bg-stone-900 rounded-xl p-4">
                    <input type="text" id="r-address" placeholder="Адрес" class="w-full bg-stone-900 rounded-xl p-4">
                    <input type="password" id="r-pass" placeholder="Пароль" class="w-full bg-stone-900 rounded-xl p-4">
                    <button onclick="register()" class="w-full bg-green-600 py-4 rounded-xl font-bold">ОТПРАВИТЬ</button>
                    <button onclick="showLogin()" class="w-full text-stone-500 text-sm mt-2">Назад</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function load() {
            const r = await fetch('/api/store-data');
            const d = await r.json();
            document.getElementById('catalog').innerHTML = d.products.map(p => `
                <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-stone-200 hover:shadow-xl transition animate__animated animate__fadeIn">
                    <div class="w-full h-48 bg-stone-100 rounded-2xl mb-4 overflow-hidden"><img src="${p.img}" class="w-full h-full object-cover"></div>
                    <h4 class="font-bold text-lg mb-2">${p.name}</h4>
                    <p class="text-green-700 font-black text-2xl">${p.price} ₽ <span class="text-xs font-normal text-stone-400">/${p.unit}</span></p>
                </div>`).join('');
        }
        function showReg(){ document.getElementById('auth-box').classList.add('hidden'); document.getElementById('reg-box').classList.remove('hidden'); }
        function showLogin(){ document.getElementById('reg-box').classList.add('hidden'); document.getElementById('auth-box').classList.remove('hidden'); }
        async function register(){
            const d = { phone: document.getElementById('r-phone').value, name: document.getElementById('r-name').value, address: document.getElementById('r-address').value, password: document.getElementById('r-pass').value };
            const r = await fetch('/api/vip/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
            alert((await r.json()).msg); showLogin();
        }
        async function login(){
            const d = { phone: document.getElementById('phone').value, password: document.getElementById('pass').value, vip_code: document.getElementById('vcode').value };
            const r = await fetch('/api/vip/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
            const res = await r.json();
            if(res.success){ alert("Доступ открыт!"); location.reload(); } else alert(res.msg);
        }
        load();
    </script>
</body>
</html>
