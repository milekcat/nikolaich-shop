<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>У Николаича</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #fcf9f2; 
            --wood-dark: #4a3320; 
            --wood-light: #8b5a2b; 
            --accent-green: #4CAF50; 
            --accent-red: #e53935; 
            --text-main: #2d2d2d;
            --card-bg: #ffffff;
            --radius: 20px;
        }

        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding-bottom: 90px;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            background: linear-gradient(135deg, var(--wood-dark), var(--wood-light));
            color: white;
            padding: 24px 16px 20px;
            font-size: 26px;
            font-weight: 800;
            text-align: center;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 4px 12px rgba(74, 51, 32, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            letter-spacing: 1px;
        }

        .categories {
            display: flex;
            overflow-x: auto;
            padding: 16px;
            gap: 10px;
        }
        .categories::-webkit-scrollbar { display: none; }
        .chip {
            background: var(--card-bg);
            color: var(--wood-dark);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .chip.active {
            background: var(--accent-green);
            color: white;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 0 16px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 6px 16px rgba(0,0,0,0.04);
            border: 1px solid rgba(139, 90, 43, 0.1);
            position: relative;
        }
        .card-img {
            width: 100%;
            height: 110px;
            background: var(--bg-main);
            border-radius: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
        }
        .price { 
            font-weight: 800; 
            font-size: 18px; 
            color: var(--wood-dark);
            margin-bottom: 4px; 
        }
        .title { 
            font-size: 14px; 
            font-weight: 600;
            margin-bottom: 12px; 
            line-height: 1.3; 
            flex-grow: 1; 
        }
        
        .btn-add {
            background: #f0f0f0;
            color: var(--text-main);
            border: none;
            padding: 10px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-add.added {
            background: var(--accent-red);
            color: white;
        }

        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            background: var(--accent-green);
            color: white;
            padding: 18px 24px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
            transform: translateY(150%);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 1000;
        }
        .cart-bar.visible { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="header">У Николаича</div>

    <div class="categories">
        <div class="chip active">Всё свежее</div>
        <div class="chip">Хлеб и Выпечка</div>
        <div class="chip">Сыры и Мясо</div>
        <div class="chip">Овощи</div>
    </div>

    <div class="grid" id="products"></div>

    <div class="cart-bar" id="cartBar" onclick="checkout()">
        <span id="cartCount">0 товаров</span>
        <span id="cartTotal">0 ₽</span>
    </div>

    <script>
        let cart = { total: 0, items: 0 };

        function renderProducts() {
            const grid = document.getElementById('products');
            const demoProducts = [
                {id: 1, name: 'Сыр Домашний Адыгейский, 500г', price: 450, img: '🧀'},
                {name: 'Хлеб Деревенский из печи', price: 85, img: '🥖'},
                {name: 'Колбаса Сырокопченая', price: 520, img: '🥩'},
                {name: 'Рыба Свежего улова, 1кг', price: 680, img: '🐟'},
                {name: 'Помидоры Грунтовые', price: 210, img: '🍅'},
                {name: 'Тыква Сладкая', price: 150, img: '🎃'}
            ];

            grid.innerHTML = demoProducts.map((p, i) => `
                <div class="card">
                    <div class="card-img">${p.img}</div>
                    <div class="price">${p.price} ₽</div>
                    <div class="title">${p.name}</div>
                    <button class="btn-add" id="btn-${i}" onclick="addToCart(this, ${p.price})">+ В корзину</button>
                </div>
            `).join('');
        }

        function addToCart(btn, price) {
            cart.items++;
            cart.total += price;
            
            btn.classList.add('added');
            btn.innerText = 'Добавлено!';
            setTimeout(() => {
                btn.classList.remove('added');
                btn.innerText = '+ В корзину';
            }, 1000);

            updateCartUI();
        }

        function updateCartUI() {
            const bar = document.getElementById('cartBar');
            document.getElementById('cartCount').innerText = `${cart.items} товаров`;
            document.getElementById('cartTotal').innerText = `${cart.total} ₽`;
            
            if (cart.items > 0) {
                bar.classList.add('visible');
            }
        }

        function checkout() {
            alert('Тут откроется окно Альфа-Банка для оплаты ' + cart.total + ' ₽');
        }

        renderProducts();
    </script>
</body>
</html>
