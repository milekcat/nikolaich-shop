<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление Nikolaich.Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4">⚙️ Панель управления (Николаич)</h1>
    
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">🤖 ИИ-Генератор акций</h5>
                    <p class="text-muted">Введите повод, ИИ сам придумает слоган и добавит баннер на сайт.</p>
                    <input type="text" id="aiTopic" class="form-control mb-3" placeholder="Например: Пятница, пиво, скидки">
                    <button onclick="generatePromo()" class="btn btn-primary w-100">Создать и выложить баннер</button>
                    <div id="aiResult" class="mt-3 fw-bold text-success"></div>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">🚚 Доставка и Дизайн</h5>
                    <label>Базовая цена доставки (руб):</label>
                    <input type="number" id="baseFee" class="form-control mb-2" value="{{ base }}">
                    <label>Цена за километр (руб):</label>
                    <input type="number" id="kmFee" class="form-control mb-2" value="{{ km }}">
                    <label>Цвет сайта (Праздники):</label>
                    <input type="color" id="themeColor" class="form-control mb-3" value="{{ theme }}">
                    <button onclick="saveSettings()" class="btn btn-dark w-100">Сохранить настройки</button>
                </div>
            </div>
        </div>
        
        <div class="col-md-12">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h5 class="card-title">📊 Аналитика и Отчеты</h5>
                    <p class="text-muted">Выгрузка всех заказов и кассы в Excel (CSV)</p>
                    <a href="/admin/export_stats" class="btn btn-success btn-lg">📥 Скачать полную статистику</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function generatePromo() {
        const topic = document.getElementById('aiTopic').value;
        document.getElementById('aiResult').innerText = "Нейросеть думает...";
        let res = await fetch('/admin/ai/promo', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({topic: topic})
        });
        let data = await res.json();
        document.getElementById('aiResult').innerText = "Готово! Новый слоган на сайте: " + data.promo;
    }

    async function saveSettings() {
        let base = document.getElementById('baseFee').value;
        let km = document.getElementById('kmFee').value;
        let theme = document.getElementById('themeColor').value;
        await fetch('/admin/settings', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({delivery_base: base, delivery_km: km, theme_color: theme})
        });
        alert("Настройки успешно сохранены!");
    }
</script>
</body>
</html>
