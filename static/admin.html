<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Николаич | Управление</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex h-screen font-sans text-gray-800">
    <aside class="w-64 bg-green-900 text-white p-6 flex flex-col">
        <h2 class="text-2xl font-black italic border-b border-green-800 pb-4 mb-4">УПРАВЛЕНИЕ</h2>
        <nav class="space-y-2">
            <button onclick="tab('orders')" class="w-full text-left p-3 rounded hover:bg-green-800 bg-green-800">📦 Заказы</button>
            <button onclick="tab('stock')" class="w-full text-left p-3 rounded hover:bg-green-800">📊 Склад (Остатки)</button>
            <button onclick="tab('users')" class="w-full text-left p-3 rounded hover:bg-green-800">👥 VIP Клиенты</button>
            <button onclick="tab('ai')" class="w-full text-left p-3 rounded hover:bg-green-800 mt-8 border-t border-green-800 pt-4 text-amber-400">🧠 AI Инструменты</button>
        </nav>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <section id="sec-stock" class="hidden">
            <h1 class="text-3xl font-black mb-6">Учет остатков товаров</h1>
            <div class="bg-white rounded-xl shadow-sm border p-4">
                <table class="w-full text-left">
                    <thead><tr class="border-b bg-gray-50"><th class="p-4">Товар</th><th class="p-4">Категория</th><th class="p-4">Цена</th><th class="p-4">Остаток</th></tr></thead>
                    <tbody id="stock-list"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-orders">
            <h1 class="text-3xl font-black mb-6">Заказы на доставку</h1>
            <div id="orders-list" class="space-y-4"></div>
        </section>

        <section id="sec-users" class="hidden">
            <h1 class="text-3xl font-black mb-6">Одобрение VIP заявок</h1>
            <div id="users-list" class="grid gap-4"></div>
        </section>

        <section id="sec-ai" class="hidden">
            <h1 class="text-3xl font-black mb-6 text-indigo-900">Генерация макетов (Artemox)</h1>
            <div class="bg-white p-8 rounded-2xl shadow-sm border">
                <div class="flex gap-4 mb-6">
                    <input type="text" id="ai-topic" class="flex-1 bg-gray-50 border p-4 rounded-xl" placeholder="Тема рекламного баннера...">
                    <button onclick="genBanner()" class="bg-indigo-600 text-white px-8 rounded-xl font-bold">Сгенерировать</button>
                </div>
                <div id="ai-res" class="hidden bg-gray-50 p-8 rounded-xl border-2 border-dashed text-center">
                    <h3 id="ai-title" class="text-4xl font-black uppercase text-green-900 mb-4"></h3>
                    <p id="ai-text" class="text-xl text-gray-700 italic mb-6"></p>
                    <img id="ai-qr" src="" class="mx-auto w-40 h-40 border p-2 bg-white">
                </div>
            </div>
        </section>
    </main>

    <script>
        function tab(t) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById('sec-'+t).classList.remove('hidden'); }
        
        async function load() {
            const r = await fetch('/api/admin/data'); const d = await r.json();
            
            // Склад
            document.getElementById('stock-list').innerHTML = d.products.map(p => `
                <tr class="border-b">
                    <td class="p-4 font-bold ${p.is_vip ? 'text-amber-600' : ''}">${p.name} ${p.is_vip ? '(VIP)' : ''}</td>
                    <td class="p-4 text-gray-500">${p.category || '-'}</td>
                    <td class="p-4">${p.price} ₽</td>
                    <td class="p-4"><span class="${p.stock < 10 ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'} px-3 py-1 rounded font-bold">${p.stock} ${p.unit}</span></td>
                </tr>`).join('');

            // Заказы
            document.getElementById('orders-list').innerHTML = d.orders.map(o => `
                <div class="bg-white p-6 rounded-xl border shadow-sm flex flex-col md:flex-row gap-6">
                    <div class="w-full md:w-1/3 border-r pr-4">
                        <div class="text-sm text-gray-500">Заказ #${o.id} | ${o.created_at}</div>
                        <h3 class="font-bold text-lg mt-2">${o.name}</h3><p>${o.phone}</p><p class="text-sm mt-2">📍 ${o.address}</p>
                        ${o.legal_consent ? '<span class="text-xs text-green-600 bg-green-50 px-2 py-1 rounded mt-2 inline-block">Согласие ПДн получено</span>' : ''}
                    </div>
                    <div class="w-full md:w-2/3">
                        <div class="bg-gray-50 p-4 rounded-lg text-sm space-y-2 mb-4">
                            ${o.items.map(i => `<div class="flex justify-between border-b pb-1"><span>${i.product_name}</span><b>${i.quantity} ${i.unit}</b></div>`).join('');}
                        </div>
                        <div class="text-right text-xl font-black text-green-800">Сумма: ${o.total} ₽</div>
                    </div>
                </div>`).join('');

            // VIP Клиенты
            document.getElementById('users-list').innerHTML = d.users.map(u => `
                <div class="bg-white p-6 rounded-xl border shadow-sm flex justify-between items-center">
                    <div><b class="text-lg">${u.name}</b><p class="text-gray-500">${u.phone}</p></div>
                    ${u.is_approved ? '<b class="text-green-600">Одобрен</b>' : `<button onclick="approve(${u.id})" class="bg-amber-500 text-white px-6 py-2 rounded-lg font-bold">Одобрить заявку</button>`}
                </div>`).join('');
        }

        async function approve(id) {
            const code = prompt("Назначьте секретный код для этого клиента:"); if(!code) return;
            await fetch('/api/admin/approve', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, code})}); load();
        }

        async function genBanner() {
            const r = await fetch('/api/ai/banner', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({topic: document.getElementById('ai-topic').value})});
            const d = await r.json();
            document.getElementById('ai-title').innerText = d.title; document.getElementById('ai-text').innerText = d.text;
            document.getElementById('ai-qr').src = d.qr; document.getElementById('ai-res').classList.remove('hidden');
        }
        load();
    </script>
</body>
</html>
