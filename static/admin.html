<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления - У Николаича</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #2e7d32; --bg: #f4f6f8; --card: #fff; --text: #333; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); margin: 0; color: var(--text); display: flex; height: 100vh;}
        
        /* Боковое меню */
        .sidebar { width: 250px; background: var(--card); box-shadow: 2px 0 10px rgba(0,0,0,0.05); padding: 20px; display: flex; flex-direction: column; gap: 10px;}
        .sidebar h2 { color: var(--main); font-weight: 900; margin-bottom: 30px; font-size: 20px;}
        .menu-btn { padding: 15px; border-radius: 12px; border: none; background: transparent; text-align: left; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; color: #555;}
        .menu-btn:hover, .menu-btn.active { background: #e8f5e9; color: var(--main); }
        
        /* Основной контент */
        .content { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .section { display: none; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h1 { font-weight: 900; font-size: 28px; margin-bottom: 20px; border-bottom: 3px solid var(--main); display: inline-block; padding-bottom: 5px;}
        
        /* Формы и карточки */
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; color: #555;}
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-family: inherit; font-size: 15px; transition: 0.2s; box-sizing: border-box;}
        input:focus, select:focus, textarea:focus { border-color: var(--main); outline: none;}
        
        .btn { background: var(--main); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #1b5e20; }
        .btn-danger { background: #e53935; }
        
        /* Карточки заказов */
        .order-card { border-left: 6px solid #ccc; }
        .order-card.Новый { border-left-color: #f44336; }
        .order-card.В-работе { border-left-color: #ff9800; }
        .order-card.Готов { border-left-color: #4caf50; }
        .order-card.Отменен { border-left-color: #9e9e9e; opacity: 0.7; }
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #e0e0e0; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 800;}
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🚜 У Николаича</h2>
        <button class="menu-btn active" onclick="switchTab('orders')">📦 Заказы</button>
        <button class="menu-btn" onclick="switchTab('catalog')">🥩 Товары и Категории</button>
        <button class="menu-btn" onclick="switchTab('marketing')">🎁 Акции и Промокоды</button>
    </div>

    <div class="content">
        <div id="orders" class="section active">
            <div class="flex-between">
                <h1>📦 Управление заказами</h1>
                <button class="btn" onclick="loadData()">🔄 Обновить</button>
            </div>
            <div id="ordersList" class="grid-list"></div>
        </div>

        <div id="catalog" class="section">
            <h1>🥩 Каталог товаров</h1>
            <div class="grid-list">
                <div class="card">
                    <h3>➕ Добавить товар</h3>
                    <div class="form-group">
                        <label>Категория</label>
                        <select id="pCat"></select>
                    </div>
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" id="pName" placeholder="Фермерский сыр">
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <textarea id="pDesc" rows="2" placeholder="Очень вкусный..."></textarea>
                    </div>
                    <div class="flex-between" style="gap:10px;">
                        <div class="form-group" style="width:50%">
                            <label>Цена (₽)</label>
                            <input type="number" id="pPrice">
                        </div>
                        <div class="form-group" style="width:50%">
                            <label>Старая цена (если скидка)</label>
                            <input type="number" id="pOldPrice" placeholder="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Фотография</label>
                        <input type="file" id="pFile" accept="image/*">
                    </div>
                    <button class="btn" onclick="addProduct()" style="width:100%">Сохранить товар</button>
                </div>

                <div class="card">
                    <h3>📁 Добавить категорию</h3>
                    <div class="form-group">
                        <label>Название категории</label>
                        <input type="text" id="cName" placeholder="Например: Напитки">
                    </div>
                    <button class="btn" onclick="addCategory()">Создать</button>
                    
                    <h3 style="margin-top: 30px;">Существующие категории:</h3>
                    <ul id="catList" style="padding-left: 20px; line-height: 1.8;"></ul>
                </div>
            </div>
            
            <h2 style="margin-top: 30px;">Все товары:</h2>
            <div class="card" style="overflow-x:auto;">
                <table id="productsTable">
                    <tr><th>Фото</th><th>Название</th><th>Цена</th><th>Категория</th><th>Действие</th></tr>
                </table>
            </div>
        </div>

        <div id="marketing" class="section">
            <h1>🎁 Акции и Маркетинг</h1>
            <div class="grid-list">
                <div class="card">
                    <h3>🌟 Создать блок Акции (на главной)</h3>
                    <div class="form-group">
                        <label>Текст акции</label>
                        <input type="text" id="promoTitle" placeholder="Скидка 20% на всё!">
                    </div>
                    <div class="form-group">
                        <label>Картинка для фона</label>
                        <input type="file" id="promoFile" accept="image/*">
                    </div>
                    <button class="btn" onclick="addPromotion()">Запустить акцию</button>
                </div>

                <div class="card">
                    <h3>🏷️ Создать Промокод</h3>
                    <div class="form-group">
                        <label>Слово-код</label>
                        <input type="text" id="pcCode" placeholder="СВОИ">
                    </div>
                    <div class="form-group">
                        <label>Скидка в процентах (%)</label>
                        <input type="number" id="pcDiscount" placeholder="10">
                    </div>
                    <button class="btn" onclick="addPromoCode()">Создать промокод</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = {};

        function switchTab(tabId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function loadData() {
            const res = await fetch('/api/admin/data');
            db = await res.json();
            renderOrders();
            renderCatalogSelects();
            renderProductsTable();
        }

        // РЕНДЕР ЗАКАЗОВ
        function renderOrders() {
            const container = document.getElementById('ordersList');
            if(db.orders.length === 0) { container.innerHTML = '<p>Пока нет заказов.</p>'; return; }
            
            container.innerHTML = db.orders.map(o => {
                const cls = o.status.replace(' ', '-');
                const items = o.items.map(i => `
                    <div class="flex-between" style="padding: 5px 0; border-bottom: 1px dashed #eee; font-size:14px;">
                        <span>${i.product_name} <b>x${i.quantity}</b></span>
                        <span>${i.price * i.quantity} ₽</span>
                    </div>
                `).join('');
                
                return `
                    <div class="card order-card ${cls}">
                        <div class="flex-between" style="margin-bottom: 15px;">
                            <h3 style="margin:0;">Заказ #${o.id}</h3>
                            <span style="color:#888; font-size:13px;">${new Date(o.created_at).toLocaleString('ru')}</span>
                        </div>
                        <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:15px; font-size:14px;">
                            <p style="margin:0 0 5px;">👤 <b>${o.name}</b></p>
                            <p style="margin:0 0 5px;">📞 ${o.phone}</p>
                            <p style="margin:0;">📍 ${o.address}</p>
                            ${o.promo_code ? `<p style="margin:5px 0 0; color:var(--main);">🏷️ Промокод: <b>${o.promo_code}</b></p>` : ''}
                        </div>
                        <div style="margin-bottom:15px;">${items}</div>
                        <h3 style="text-align:right; color:var(--main); margin-bottom:15px;">Итого: ${o.total} ₽</h3>
                        <div>
                            <label>Статус:</label>
                            <select onchange="updateOrderStatus(${o.id}, this.value)" style="font-weight:bold;">
                                <option value="Новый" ${o.status==='Новый'?'selected':''}>🔴 Новый</option>
                                <option value="В работе" ${o.status==='В работе'?'selected':''}>🟠 В работе (собираем)</option>
                                <option value="Готов" ${o.status==='Готов'?'selected':''}>🟢 Доставлен</option>
                                <option value="Отменен" ${o.status==='Отменен'?'selected':''}>⚪ Отменен</option>
                            </select>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function updateOrderStatus(id, status) {
            await fetch(`/api/admin/orders/${id}/status`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status})
            });
            loadData();
        }

        // РЕНДЕР КАТАЛОГА
        function renderCatalogSelects() {
            const catSelect = document.getElementById('pCat');
            catSelect.innerHTML = db.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            
            document.getElementById('catList').innerHTML = db.categories.map(c => `<li>${c.name}</li>`).join('');
        }

        function renderProductsTable() {
            const table = document.getElementById('productsTable');
            table.innerHTML = '<tr><th>Фото</th><th>Название</th><th>Цена</th><th>Действие</th></tr>' + 
            db.products.map(p => `
                <tr>
                    <td>${p.img ? `<img src="${p.img}" height="40" style="border-radius:8px;">` : 'Нет'}</td>
                    <td><b>${p.name}</b></td>
                    <td>${p.price} ₽ ${p.old_price>0 ? `<s>${p.old_price}</s>` : ''}</td>
                    <td><button class="btn btn-danger" style="padding: 6px 12px; font-size: 13px;" onclick="deleteProduct(${p.id})">Удалить</button></td>
                </tr>
            `).join('');
        }

        // ЗАГРУЗКА ФАЙЛОВ И ДОБАВЛЕНИЕ
        async function uploadImage(fileInputId) {
            const file = document.getElementById(fileInputId).files[0];
            if(!file) return '';
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/admin/upload', { method: 'POST', body: formData });
            const data = await res.json();
            return data.url;
        }

        async function addProduct() {
            const imgUrl = await uploadImage('pFile');
            const data = {
                category_id: document.getElementById('pCat').value,
                name: document.getElementById('pName').value,
                description: document.getElementById('pDesc').value,
                price: parseFloat(document.getElementById('pPrice').value),
                old_price: parseFloat(document.getElementById('pOldPrice').value) || 0,
                img: imgUrl
            };
            await fetch('/api/admin/products', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
            alert('Товар добавлен!');
            loadData();
        }

        async function deleteProduct(id) {
            if(confirm('Точно удалить?')) {
                await fetch(`/api/admin/products/${id}`, { method:'DELETE' });
                loadData();
            }
        }

        async function addCategory() {
            const name = document.getElementById('cName').value;
            await fetch('/api/admin/categories', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name}) });
            document.getElementById('cName').value = '';
            loadData();
        }

        async function addPromotion() {
            const imgUrl = await uploadImage('promoFile');
            const title = document.getElementById('promoTitle').value;
            await fetch('/api/admin/promotions', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({title, img: imgUrl}) });
            alert('Акция запущена!');
            loadData();
        }

        async function addPromoCode() {
            const code = document.getElementById('pcCode').value;
            const discount = document.getElementById('pcDiscount').value;
            await fetch('/api/admin/promocodes', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({code, discount}) });
            alert(`Промокод ${code} создан!`);
            loadData();
        }

        loadData();
    </script>
</body>
</html>
