<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>У Николаича | Доставка продуктов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.smooth { transition: all 0.3s ease; }</style>
</head>
<body id="body-bg" class="bg-stone-50 text-stone-900 font-sans min-h-screen flex flex-col smooth">

    <header id="header-bg" class="bg-green-800 text-white p-4 sticky top-0 z-50 shadow-md smooth">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span id="theme-icon" class="text-3xl">🚜</span>
                <div>
                    <h1 class="text-2xl font-black italic uppercase leading-none">У Николаича</h1>
                    <p id="theme-greeting" class="text-xs opacity-80 mt-1">Свежие продукты с доставкой на дом</p>
                </div>
            </div>
            <div onclick="toggleCart()" class="relative cursor-pointer hover:scale-105 smooth bg-white/10 p-3 rounded-xl">
                <span class="text-2xl">🛒</span>
                <span id="cart-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full hidden">0</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 flex-grow flex flex-col md:flex-row gap-6 mt-4">
        <aside class="w-full md:w-1/4">
            <div class="bg-white rounded-2xl shadow-sm p-4 sticky top-24">
                <h3 class="font-bold text-lg mb-4 border-b pb-2">Категории</h3>
                <nav id="cat-list" class="flex flex-col gap-2"></nav>
            </div>
        </aside>

        <div class="w-full md:w-3/4">
            <h2 id="current-cat-title" class="text-3xl font-black mb-6">Все товары</h2>
            <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-md flex flex-col max-h-[90vh] overflow-hidden shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-2xl font-bold">Оформление доставки</h2>
                <button onclick="toggleCart()" class="text-2xl text-gray-400 hover:text-black">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-grow" id="cart-content">
                <div id="cart-items" class="space-y-4 mb-6"></div>
                <div class="text-xl font-black text-right mb-6 border-t pt-4">Итого: <span id="cart-total" class="text-green-600">0</span> ₽</div>
                
                <h3 class="font-bold mb-4">Куда везти?</h3>
                <form id="checkout-form" class="space-y-3" onsubmit="submitOrder(event)">
                    <input type="text" id="c-name" required placeholder="Ваше имя" class="w-full bg-gray-100 border-none rounded-xl p-3">
                    <input type="tel" id="c-phone" required placeholder="Телефон для связи" class="w-full bg-gray-100 border-none rounded-xl p-3">
                    <input type="text" id="c-address" required placeholder="Полный адрес доставки" class="w-full bg-gray-100 border-none rounded-xl p-3">
                    <input type="text" id="c-vk" placeholder="Ссылка на ВК (для чека)" class="w-full bg-gray-100 border-none rounded-xl p-3">
                    <button type="submit" id="btn-submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl mt-4 text-lg hover:bg-green-500 smooth">Заказать доставку</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="bg-stone-900 text-stone-500 py-10 mt-10 relative">
        <div class="container mx-auto text-center"><p>© 2026 Магазин «У Николаича»</p></div>
        <div onclick="askVIP()" class="absolute bottom-2 right-2 opacity-10 hover:opacity-100 cursor-pointer p-4 text-xl">🔒</div>
    </footer>

    <script>
        let allProducts = [], cart = [], themeClass = "bg-green-600";

        async function init() {
            const r = await fetch('/api/store'); const d = await r.json();
            applyTheme(d.theme);
            allProducts = d.products;
            
            // Рендер категорий
            document.getElementById('cat-list').innerHTML = `<button onclick="filterCat(null)" class="text-left px-4 py-2 rounded-xl hover:bg-gray-100 font-bold w-full">🚜 Все товары</button>` + 
                d.categories.map(c => `<button onclick="filterCat(${c.id}, '${c.name}')" class="text-left px-4 py-2 rounded-xl hover:bg-gray-100 font-medium w-full">${c.icon} ${c.name}</button>`).join('');
            
            filterCat(null);
        }

        function applyTheme(t) {
            document.getElementById('body-bg').className = `${t.bg} text-stone-900 font-sans min-h-screen flex flex-col smooth`;
            document.getElementById('header-bg').className = `${t.header} text-white p-4 sticky top-0 z-50 shadow-md smooth`;
            document.getElementById('theme-icon').innerText = t.icon;
            document.getElementById('theme-greeting').innerText = t.greeting;
            themeClass = t.btn;
            if(document.getElementById('btn-submit')) document.getElementById('btn-submit').className = `w-full ${t.btn} text-white font-bold py-4 rounded-xl mt-4 text-lg smooth`;
        }

        function filterCat(catId, catName = "Все товары") {
            document.getElementById('current-cat-title').innerText = catName;
            const prods = catId ? allProducts.filter(p => p.category_id === catId) : allProducts;
            document.getElementById('product-grid').innerHTML = prods.map(p => `
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-col">
                    <div class="w-full h-32 bg-gray-100 rounded-xl mb-3 overflow-hidden"><img src="${p.img||''}" class="w-full h-full object-cover"></div>
                    <h4 class="font-bold text-sm leading-tight mb-1 flex-grow">${p.name}</h4>
                    <div class="text-lg font-black text-gray-800 mb-3">${p.price} ₽ <span class="text-xs font-normal text-gray-400">/${p.unit}</span></div>
                    <button onclick="addCart(${p.id})" class="w-full ${themeClass} text-white py-2 rounded-lg font-bold text-sm hover:opacity-90">В корзину</button>
                </div>`).join('');
        }

        function addCart(id) {
            const p = allProducts.find(x => x.id === id);
            const inCart = cart.find(x => x.id === id);
            if(inCart) inCart.quantity++; else cart.push({...p, quantity: 1});
            updateCart();
        }

        function updateCart() {
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.reduce((s, i) => s + i.quantity, 0);
            badge.style.display = cart.length ? 'block' : 'none';
            
            let sum = 0;
            document.getElementById('cart-items').innerHTML = cart.map(i => {
                sum += i.price * i.quantity;
                return `<div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg"><div class="text-sm font-bold">${i.name}</div><div class="flex items-center gap-3"><b class="text-gray-800">${i.price * i.quantity} ₽</b><span class="text-xs bg-gray-200 px-2 rounded">${i.quantity} ${i.unit}</span></div></div>`;
            }).join('');
            document.getElementById('cart-total').innerText = sum;
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        async function submitOrder(e) {
            e.preventDefault();
            if(!cart.length) return alert("Корзина пуста!");
            const d = { name: document.getElementById('c-name').value, phone: document.getElementById('c-phone').value, address: document.getElementById('c-address').value, vk_link: document.getElementById('c-vk').value, total: parseInt(document.getElementById('cart-total').innerText), cart: cart };
            const r = await fetch('/api/checkout', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
            if((await r.json()).success) { alert("🚚 Заказ принят! Скоро доставим."); location.reload(); }
        }

        async function askVIP() {
            const phone = prompt("VIP Телефон:"); const pass = prompt("Пароль:"); const code = prompt("Код доступа:");
            if(!phone || !pass || !code) return;
            const r = await fetch('/api/vip/auth', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone, pass, code})});
            const d = await r.json();
            if(d.success) { allProducts = [...allProducts, ...d.vip_products]; filterCat(null, "VIP Доступ открыт"); alert("Добро пожаловать в закрытый клуб."); }
            else alert("Доступ запрещен.");
        }

        init();
    </script>
</body>
</html>
