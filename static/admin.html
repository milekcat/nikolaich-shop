<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Николаич | CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 flex h-screen overflow-hidden">

    <aside class="w-72 bg-slate-800 border-r border-slate-700 flex flex-col">
        <div class="p-8 text-2xl font-black italic text-green-500">НИКОЛАИЧ CRM</div>
        <nav class="flex-1 px-4 space-y-2">
            <button onclick="showTab('orders')" class="w-full text-left p-4 rounded-xl bg-slate-700 font-bold border-l-4 border-green-500 transition">📦 Заказы</button>
            <button onclick="showTab('products')" class="w-full text-left p-4 rounded-xl hover:bg-slate-700 text-slate-400 transition">🍎 Каталог</button>
            <button onclick="showTab('vk')" class="w-full text-left p-4 rounded-xl hover:bg-slate-700 text-blue-400 transition">💬 Рассылка ВК</button>
        </nav>
        <div class="p-8 border-t border-slate-700 text-xs text-slate-500">Version 2.0 Pro</div>
    </aside>

    <main class="flex-1 overflow-y-auto p-12 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-slate-800 via-slate-900 to-slate-900">
        
        <section id="tab-orders">
            <div class="flex justify-between items-end mb-10">
                <h1 class="text-4xl font-black">Новые заказы</h1>
                <div id="stats" class="flex gap-8">
                    </div>
            </div>
            <div id="orders-grid" class="grid grid-cols-1 gap-6">
                </div>
        </section>

        <section id="tab-products" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-4xl font-black">Каталог товаров</h1>
                <button onclick="openProductModal()" class="bg-green-600 hover:bg-green-500 text-white px-8 py-3 rounded-xl font-bold transition shadow-lg shadow-green-900/20">+ Добавить</button>
            </div>
            <div id="products-list" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

    </main>

    <script>
        async function loadData() {
            const res = await fetch('/api/admin/data');
            const data = await res.json();
            renderOrders(data.orders);
            renderProducts(data.products);
        }

        function renderOrders(orders) {
            const grid = document.getElementById('orders-grid');
            grid.innerHTML = orders.map(o => `
                <div class="bg-slate-800 rounded-3xl p-8 border border-slate-700 shadow-2xl">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-green-500 font-bold mb-2 block">ЗАКАЗ #${o.id}</span>
                            <h2 class="text-2xl font-bold">${o.name}</h2>
                            <p class="text-slate-400 text-lg">${o.phone}</p>
                            <p class="text-slate-500 mt-2 italic">📍 ${o.address}</p>
                        </div>
                        <div class="text-right">
                            <select onchange="updateStatus(${o.id}, this.value)" class="bg-slate-700 border-none rounded-xl p-3 font-bold outline-none">
                                <option ${o.status=='Новый'?'selected':''}>Новый</option>
                                <option ${o.status=='В работе'?'selected':''}>В работе</option>
                                <option ${o.status=='Доставлен'?'selected':''}>Доставлен</option>
                            </select>
                            <div class="mt-4 text-3xl font-black text-green-500">${o.total} ₽</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 border-t border-slate-700 pt-6">
                        ${o.items.map(i => `<div class="bg-slate-900/50 p-3 rounded-xl"><p class="font-bold text-sm">${i.product_name}</p><p class="text-slate-500 text-xs">${i.quantity} ${i.unit}</p></div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(id, status) {
            await fetch(`/api/admin/orders/${id}/status`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status})
            });
            loadData();
        }

        function showTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
        }

        loadData();
    </script>
</body>
</html>
